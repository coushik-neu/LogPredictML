version: '1.0'

services:
  postgres:
    image: docker.io/postgres:15
    container_name: sales_postgres
    restart: always
    env_file:
      - .env
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres/db:/docker-entrypoint-initdb.d
    networks:
      - saas-network
  data-generator:
    build: ./data-source-service
    container_name: data-source-container
    depends_on:
      - postgres
    volumes:
      - ./data-source-service:/app
    env_file:
      - .env
    networks:
      - saas-network

volumes:
  postgres_data:

networks:
  saas-network:
    driver: bridge
  
