version: '1.0'

services:
  postgres:
    image: docker.io/postgres:15
    container_name: sales_postgres
    restart: always
    env_file:
      - .env
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres/db:/docker-entrypoint-initdb.d
    networks:
      - saas-network
  data-init:
    build: ./data-init
    container_name: data-init-container
    depends_on:
      - postgres
    env_file:
      - .env
    networks:
      - saas-network
  data-generator:
    build: ./data-source-service
    container_name: data-source-container
    depends_on:
      - postgres
    volumes:
      - ./data-source-service:/app
    env_file:
      - .env
    networks:
      - saas-network
  model-training:
    build: ./model-training-service
    container_name: model-training-container
    depends_on:
      - postgres
    volumes:
      - ./model-training-service:/app
      - ./models:/models
    env_file:
      - .env
    networks:
      - saas-network
  ml-service-worker:
    build: ./ml-worker-service
    container_name: ml-worker-container
    depends_on:
      - postgres
    volumes:
      - ./models:/models
    env_file:
      - .env
    networks:
      - saas-network
  

volumes:
  postgres_data:

networks:
  saas-network:
    driver: bridge
  
